version: '3.2'

services:
  agent:
    image: portainer/agent:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints: 
          - node.platform.os == linux

  portainer:
    image: portainer/portainer-ce:lts
    command: -H tcp://tasks.agent:9001 --tlsskipverify --admin-password-file /tmp/portainer-password.txt
    ports:
      - "9443:9443"
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - /vagrant/portainer-password.txt:/tmp/portainer-password.txt
    networks:
      - agent_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: 
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 20s
        max_attempts: 3
        window: 90s

  jenkins-controller:
    image: jenkins-custom:latest
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /vagrant/jenkins/controller/controllerData/scripts:/scripts
      - /vagrant/jenkins/controller/controllerData/piplines:/piplines
    environment:
      JENKINS_ADMIN_PASSWORD: /run/secrets/jenkins_admin_password
      JENKINS_GITHUB_TOKEN: /run/secrets/jenkins_github_token
      JENKINS_SLACK_TOKEN: /run/secrets/jenkins_slack_token
      SSH_WORKER1_KEY: /run/secrets/ssh_worker1_key
      SSH_MANAGER_KEY: /run/secrets/ssh_manager_key
    secrets:
      - jenkins_admin_password
      - jenkins_github_token
      - jenkins_slack_token
      - ssh_worker1_key
      - ssh_manager_key
    networks:
      - cinema-overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  agent_network:
    driver: overlay
    attachable: true
  cinema-overlay:
    driver: overlay

secrets:
  jenkins_admin_password:
    file: ./jenkins/secrets/jenkins_admin_password.txt
  jenkins_github_token:
    file: ./jenkins/secrets/jenkins_github_token.txt
  jenkins_slack_token:
    file: ./jenkins/secrets/jenkins_slack_token.txt
  ssh_worker1_key:
    file: ./jenkins/secrets/ssh_worker1_key
  ssh_manager_key:
    file: ./jenkins/secrets/ssh_manager_key
    
volumes:
  portainer_data:
  jenkins_data:
  jenkins-docker-certs:
